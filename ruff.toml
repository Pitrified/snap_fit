# Ruff configuration file
# https://docs.astral.sh/ruff/rules/

target-version = "py313"

[lint]
select = ["ALL"]
ignore = [
    "COM812", # Missing trailing comma, conflict with the formatter
    "D104",   # Missing docstring in public package
    "D203",   # 1 blank line required before class docstring
    "D213",   # Multi-line docstring summary should start at the second line
    "D413",   # Missing blank line after last section
    "FIX002", # Line contains TODO, consider resolving the issue
    "RET504", # Unnecessary assignment to `value` before `return` statement
    "TD002",  # Missing author in TODO
    "TD003",  # Missing issue link for this TODO
]

[lint.per-file-ignores]
"*.ipynb" = [
    "B905",  # zip() without explicit strict= - exploratory notebooks often use simple zips
    "E402",  # Module level import not at top of cell - natural in notebook exploration
    "E501",  # Line too long - f-strings in notebooks are hard to wrap
    "E741",  # Ambiguous variable name - common in notebooks (l for label, etc.)
    "ERA001", # Found commented-out code
    "F401",   # unused import
    "FBT003", # Boolean positional value in function call - common in matplotlib (ax.grid(True))
    "T20",    # print found
]
".github/**" = [
    "T20",     # print found
    "INP001",  # not a part of an implicit namespace package
]
"tests/*" = [
    "ARG001",  # Unused function argument: mocks and similar
    "INP001",  # File `tests/...` is part of an implicit namespace package. Add an `__init__.py`. Causes a bug.
    "PLC0415", # `import` should be at top-level: intentional in pytest fixtures that mutate env vars
    "PLR2004", # Magic value used in comparison, consider replacing `NUM` with a constant variable
    "S101",    # Use of assert detected
    "SLF001",  # Private member accessed
]
"meta/*" = [
    "INP001", # Implicit namespace package
    "T20",    # print found
]
"scratch_space/**" = [
    "A004",    # Argument is shadowing a Python builtin
    "ANN001",  # Missing type annotation for function argument
    "ANN201",  # Missing return type annotation for public function
    "ANN204",  # Missing return type annotation for special method
    "BLE001",  # Do not catch blind exception
    "D101",    # Missing docstring in public class
    "D105",    # Missing docstring in magic method
    "D107",    # Missing docstring in `__init__`
    "E731",    # Do not assign a lambda expression, use a def
    "EM101",   # Exception must not use a string literal
    "EM102",   # Exception must not use an f-string literal
    "F821",    # Undefined name - common in multi-cell notebooks
    "F541",    # f-string without any placeholders - exploratory output
    "I001",    # Import block is un-sorted or un-formatted
    "INP001",  # File is part of an implicit namespace package
    "N806",    # Variable in function should be lowercase
    "N811",    # Constant imported as non-constant
    "N817",    # CamelCase imported as acronym
    "NPY201",  # `np.bool` is a deprecated alias
    "PERF102", # When using only the values of a dict use `.values()`
    "PERF401", # Use a list comprehension to create a transformed list
    "PLR1714", # Consider merging multiple comparisons
    "PLR2004", # Magic value used in comparison
    "PLC0415", # `import` should be at top-level - unavoidable in some notebook cells
    "RUF003",  # Comment contains ambiguous character
    "S101",    # Use of assert detected
    "S311",    # Standard pseudo-random generators not suitable for cryptographic use
    "SLF001",  # Private member accessed - exploratory code accesses internals
    "TRY003",  # Avoid specifying long messages outside the exception class
    "UP035",   # `typing` member deprecated, use `...` instead
    # Additional scratch-space-specific suppressions
    "A002",    # Argument is shadowing a Python builtin (e.g. `id`)
    "B007",    # Loop control variable not used within loop body
    "D103",    # Missing docstring in public function
    "D417",    # Missing argument descriptions in the docstring
    "RUF100",  # Unused noqa directive - noqa comments become stale when rules are globally suppressed
    "T20",     # print found
    "E501",    # Line too long - exploratory code often has long lines that are hard to wrap
    "ERA001",  # Found commented-out code - common in exploratory code
]

[lint.pylint]
max-args = 10

[lint.isort]
force-sort-within-sections = true
force-single-line = true
